<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validation - Easy Tutorials YouTube Channel</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
    <div class="container">
    <form>
        <i class="fas fa-paper-plane"></i>

        <div class="input-group">
        <label>Full Name</label>
        <input type="text" placeholder="Enter your name" id="contactName">
        <span id="name-error"></span>
    </div>
    
    <div class="input-group">
        <label>Phone No.</label>
        <input type="tel" placeholder="123 456 7890" id="PhoneName">
        <span id="phone-error"></span>
    </div>
    
    <div class="input-group">
        <label>Email Id</label>
        <input type="email" placeholder="Enter Email" id="emailName">
        <span id="email-error"></span>
    </div>   
    
    <div class="input-group">
        <label>Your Message</label>
        <textarea rows="5" placeholder="Enter your message" id="messegeName"></textarea>
        <span id="messege-error"></span>
    </div>
    
    <button type="submit" id="messegeBTN">Submit</button>
    <span id="submit-error"></span>
    </form>
    <script src="Main.js"></script>
</body>
</html>
